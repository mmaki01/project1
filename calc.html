<!DOCTYPE html>
<html>
<head>
<title>Sample JavaScript I0 Page</title>

<script>
function add()  {
  let a = document.getElementById("fn").value;
  let b = document.getElementById("sn").value;
  let c = Number(a) + Number(b);
  document.getElementById("ans").innerHTML = c;
}

function sub()  {
  let a = document.getElementById("fn").value;
  let b = document.getElementById("sn").value;
  let c = Number(a) - Number(b);
  document.getElementById("ans").innerHTML = c;
}

function mult()  {     /* FIXED */
  let a = document.getElementById("fn").value;
  let b = document.getElementById("sn").value;
  let c = Number(a) * Number(b);
  document.getElementById("ans").innerHTML = c;
}

function div()  {      /* FIXED */
  let a = document.getElementById("fn").value;
  let b = document.getElementById("sn").value;
  let c = Number(a) / Number(b);
  document.getElementById("ans").innerHTML = c;
}
</script>
</head>

<body>
<h3>This is a sample JavaScript and HTML document.</h3>

<p>
  First number? <input id="fn"> <br>   <!-- FIXED -->
  Second number? <input id="sn"> <br> <!-- FIXED -->
</p>

<button onclick="add()"> + </button>
<button onclick="sub()"> - </button>
<button onclick="mult()"> * </button>
<button onclick="div()"> / </button>

<p>Your answer is <span id="ans">__________</span></p>

</body>
</html>
