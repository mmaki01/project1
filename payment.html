<!DOCTYPE html>
<html>
<head>
    <title>Loan Payment Calculator</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        label { display: block; margin-top: 10px; }
        input { padding: 6px; width: 200px; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h2>Loan Payment Calculator</h2>

<label>Loan Amount ($):</label>
<input type="number" id="amount">

<label>Annual Interest Rate (%):</label>
<input type="number" id="rate">

<label>Loan Term (Years):</label>
<input type="number" id="years">

<button onclick="calculatePayment()">Calculate Payment</button>

<div id="result"></div>

<script>
function calculatePayment() {
    let amount = parseFloat(document.getElementById("amount").value);
    let annualRate = parseFloat(document.getElementById("rate").value) / 100;
    let years = parseFloat(document.getElementById("years").value);

    let monthlyRate = annualRate / 12;
    let numberOfPayments = years * 12;

    let payment = (amount * monthlyRate * Math.pow(1 + monthlyRate, numberOfPayments)) /
                  (Math.pow(1 + monthlyRate, numberOfPayments) - 1);

    document.getElementById("result").innerHTML =
        "Monthly Payment: $" + payment.toFixed(2);
}
</script>

</body>
</html>
